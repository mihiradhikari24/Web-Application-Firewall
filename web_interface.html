<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WAF Attack Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --border:  #30363d;
    --text:    #e6edf3;
    --muted:   #8b949e;
    --accent:  #58a6ff;
    --green:   #3fb950;
    --yellow:  #d29922;
    --red:     #f85149;
    --mono:    'Courier New', monospace;
  }

  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif;
         font-size: 14px; line-height: 1.5; padding: 24px; min-height: 100vh; }

  h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

  /* ── stats row ── */
  .stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
  .stat  { background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
           padding: 14px 20px; min-width: 130px; }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
  .stat-value { font-size: 28px; font-weight: 700; margin-top: 2px; }
  .stat-value.green  { color: var(--green); }
  .stat-value.yellow { color: var(--yellow); }
  .stat-value.red    { color: var(--red); }
  .stat-value.blue   { color: var(--accent); }

  /* ── charts ── */
  .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .chart-box { background: var(--surface); border: 1px solid var(--border);
               border-radius: 8px; padding: 16px; }
  .chart-box h2 { font-size: 13px; color: var(--muted); margin-bottom: 12px;
                  text-transform: uppercase; letter-spacing: .05em; }
  canvas { max-height: 220px; }

  /* ── search bar ── */
  .search-row { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .search-row input, .search-row select {
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); padding: 7px 12px; font-size: 13px; outline: none;
    transition: border-color .15s;
  }
  .search-row input { flex: 1; min-width: 180px; }
  .search-row input:focus, .search-row select:focus { border-color: var(--accent); }
  .search-row button {
    background: var(--accent); color: #000; border: none; border-radius: 6px;
    padding: 7px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .search-row button:hover { opacity: .85; }

  /* ── table ── */
  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 8px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th { background: var(--surface); color: var(--muted); text-align: left;
             padding: 10px 12px; font-weight: 600; border-bottom: 1px solid var(--border);
             white-space: nowrap; position: sticky; top: 0; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(88,166,255,.05); }
  td { padding: 8px 12px; font-family: var(--mono); vertical-align: top;
       max-width: 260px; word-break: break-all; }

  /* status badges */
  .badge { display: inline-block; padding: 1px 7px; border-radius: 99px;
           font-size: 11px; font-weight: 700; }
  .badge-200 { background: rgba(63,185,80,.15);  color: var(--green); }
  .badge-403 { background: rgba(248,81,73,.15);  color: var(--red); }
  .badge-429 { background: rgba(210,153,34,.15); color: var(--yellow); }
  .badge-other{ background: rgba(139,148,158,.15); color: var(--muted); }

  /* attack type chip */
  .chip { display: inline-block; padding: 1px 7px; border-radius: 4px; font-size: 11px;
          background: rgba(88,166,255,.12); color: var(--accent); }

  /* empty / loading states */
  .info { text-align: center; padding: 40px; color: var(--muted); }

  #count { color: var(--muted); font-size: 12px; margin-bottom: 8px; }

  @media (max-width: 640px) {
    .charts { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<h1>⚡ WAF Attack Dashboard</h1>
<p class="subtitle">Loads <code>attacks.jsonl</code> via fetch — serve with <code>python -m http.server</code></p>

<!-- stat cards -->
<div class="stats">
  <div class="stat"><div class="stat-label">Total Events</div><div class="stat-value blue"  id="s-total">—</div></div>
  <div class="stat"><div class="stat-label">Unique IPs</div>  <div class="stat-value blue"  id="s-ips">—</div></div>
  <div class="stat"><div class="stat-label">Blocked (403)</div><div class="stat-value red"  id="s-403">—</div></div>
  <div class="stat"><div class="stat-label">Rate Ltd (429)</div><div class="stat-value yellow" id="s-429">—</div></div>
  <div class="stat"><div class="stat-label">Passed (200)</div><div class="stat-value green" id="s-200">—</div></div>
</div>

<!-- charts -->
<div class="charts">
  <div class="chart-box"><h2>Attacks by Type</h2><canvas id="chartType"></canvas></div>
  <div class="chart-box"><h2>Responses by Status</h2><canvas id="chartStatus"></canvas></div>
</div>

<!-- search -->
<div class="search-row">
  <input  id="q-ip"     placeholder="Filter by IP…" />
  <input  id="q-type"   placeholder="Filter by attack_type…" />
  <select id="q-status">
    <option value="">All statuses</option>
    <option value="200">200</option>
    <option value="403">403</option>
    <option value="429">429</option>
  </select>
  <button onclick="applyFilter()">Filter</button>
  <button onclick="resetFilter()" style="background:var(--surface);color:var(--text);border:1px solid var(--border)">Reset</button>
</div>

<div id="count"></div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Timestamp</th>
        <th>IP</th>
        <th>Method</th>
        <th>Path</th>
        <th>Attack Type</th>
        <th>Rule ID</th>
        <th>Field</th>
        <th>Payload</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty" class="info">Loading <code>attacks.jsonl</code>…</div>
</div>

<script>
// ── data ─────────────────────────────────────────────────────────────────────
let ALL = [];
let chartType   = null;
let chartStatus = null;

// ── load ─────────────────────────────────────────────────────────────────────
async function load() {
  try {
    const res = await fetch("logs/attacks_v2.jsonl");
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    ALL = text.trim().split("\n")
              .filter(l => l.trim())
              .map(l => { try { return JSON.parse(l); } catch { return null; } })
              .filter(Boolean);
    render(ALL);
    buildCharts(ALL);
    buildStats(ALL);
  } catch (e) {
    document.getElementById("empty").textContent =
      `Could not load attacks.jsonl — ${e.message}. ` +
      `Serve this file with: python -m http.server`;
  }
}

// ── stats ─────────────────────────────────────────────────────────────────────
function buildStats(rows) {
  document.getElementById("s-total").textContent = rows.length;
  document.getElementById("s-ips").textContent   = new Set(rows.map(r => r.client_ip)).size;
  document.getElementById("s-403").textContent   = rows.filter(r => String(r.status) === "403").length;
  document.getElementById("s-429").textContent   = rows.filter(r => String(r.status) === "429").length;
  document.getElementById("s-200").textContent   = rows.filter(r => String(r.status) === "200").length;
}

// ── charts ────────────────────────────────────────────────────────────────────
const PALETTE = [
  "#58a6ff","#f85149","#3fb950","#d29922","#a5d6ff",
  "#ff7b72","#79c0ff","#56d364","#e3b341","#ffa657"
];

function buildCharts(rows) {
  // attack_type counts
  const typeCounts = {};
  rows.forEach(r => { const t = r.attack_type || "unknown"; typeCounts[t] = (typeCounts[t]||0)+1; });
  const typeLabels = Object.keys(typeCounts);
  const typeVals   = typeLabels.map(k => typeCounts[k]);

  // status counts
  const statusCounts = {};
  rows.forEach(r => { const s = String(r.status||0); statusCounts[s] = (statusCounts[s]||0)+1; });
  const statusLabels = Object.keys(statusCounts);
  const statusVals   = statusLabels.map(k => statusCounts[k]);
  const statusColors = statusLabels.map(s =>
    s==="200" ? "#3fb950" : s==="403" ? "#f85149" : s==="429" ? "#d29922" : "#8b949e"
  );

  const defaults = {
    responsive: true,
    plugins: {
      legend: { labels: { color: "#8b949e", boxWidth: 12, font: { size: 11 } } }
    }
  };

  if (chartType)   chartType.destroy();
  if (chartStatus) chartStatus.destroy();

  chartType = new Chart(document.getElementById("chartType"), {
    type: "bar",
    data: {
      labels: typeLabels,
      datasets: [{ label: "Events", data: typeVals,
        backgroundColor: typeLabels.map((_, i) => PALETTE[i % PALETTE.length]),
        borderRadius: 4, borderSkipped: false }]
    },
    options: { ...defaults,
      scales: {
        x: { ticks: { color: "#8b949e", font: { size: 10 } }, grid: { color: "#21262d" } },
        y: { ticks: { color: "#8b949e" }, grid: { color: "#21262d" }, beginAtZero: true }
      }
    }
  });

  chartStatus = new Chart(document.getElementById("chartStatus"), {
    type: "doughnut",
    data: {
      labels: statusLabels,
      datasets: [{ data: statusVals, backgroundColor: statusColors,
        borderColor: "#0d1117", borderWidth: 2, hoverOffset: 6 }]
    },
    options: { ...defaults, cutout: "60%" }
  });
}

// ── table ─────────────────────────────────────────────────────────────────────
function badgeHtml(status) {
  const s = String(status);
  const cls = s==="200" ? "badge-200" : s==="403" ? "badge-403" : s==="429" ? "badge-429" : "badge-other";
  return `<span class="badge ${cls}">${s}</span>`;
}

function esc(v) {
  if (v == null) return "—";
  return String(v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function render(rows) {
  const tbody = document.getElementById("tbody");
  const empty = document.getElementById("empty");

  if (rows.length === 0) {
    tbody.innerHTML = "";
    empty.style.display = "block";
    empty.textContent   = "No matching records.";
    document.getElementById("count").textContent = "";
    return;
  }

  empty.style.display = "none";
  document.getElementById("count").textContent = `Showing ${rows.length} record${rows.length !== 1 ? "s" : ""}`;

  tbody.innerHTML = rows.map(r => `
    <tr>
      <td style="white-space:nowrap;color:var(--muted)">${esc(r.timestamp)}</td>
      <td>${esc(r.client_ip)}</td>
      <td style="color:var(--accent)">${esc(r.method)}</td>
      <td>${esc(r.path)}</td>
      <td><span class="chip">${esc(r.attack_type)}</span></td>
      <td style="color:var(--muted)">${esc(r.rule_id)}</td>
      <td style="color:var(--muted)">${esc(r.field)}</td>
      <td style="max-width:200px;color:#ccc">${esc(r.raw_payload)}</td>
      <td>${badgeHtml(r.status)}</td>
    </tr>`).join("");
}

// ── filter ────────────────────────────────────────────────────────────────────
function applyFilter() {
  const ip     = document.getElementById("q-ip").value.trim().toLowerCase();
  const type   = document.getElementById("q-type").value.trim().toLowerCase();
  const status = document.getElementById("q-status").value;

  const filtered = ALL.filter(r => {
    if (ip     && !(r.client_ip   || "").toLowerCase().includes(ip))     return false;
    if (type   && !(r.attack_type || "").toLowerCase().includes(type))    return false;
    if (status && String(r.status) !== status)                            return false;
    return true;
  });

  render(filtered);
  buildStats(filtered);
  buildCharts(filtered);
}

function resetFilter() {
  document.getElementById("q-ip").value     = "";
  document.getElementById("q-type").value   = "";
  document.getElementById("q-status").value = "";
  render(ALL);
  buildStats(ALL);
  buildCharts(ALL);
}

// allow Enter key in search fields
["q-ip","q-type","q-status"].forEach(id =>
  document.getElementById(id).addEventListener("keydown", e => { if (e.key === "Enter") applyFilter(); })
);

load();
</script>
</body>
</html>
